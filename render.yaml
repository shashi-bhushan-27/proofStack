services:
  # FastAPI Backend Service
  - type: web
    name: proofstack-api
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: FIREBASE_PROJECT_ID
        value: proofstack-b606d
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
