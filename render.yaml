services:
  # FastAPI Backend Service
  - type: web
    name: proofstack-api
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proofstack-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        value: proofstack-b606d
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'

databases:
  # Managed PostgreSQL Database
  - name: proofstack-db
    databaseName: proofstack
    user: proofstack
    plan: free
